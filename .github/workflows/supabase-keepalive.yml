name: Supabase Keep Alive

on:
  schedule:
    # 매주 월요일, 목요일 오전 9시(UTC 00:00)에 실행
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API to prevent pausing
        run: |
          if [ -z "${{ secrets.SUPABASE_URL }}" ] || [ -z "${{ secrets.SUPABASE_ANON_KEY }}" ]; then
            echo "::error::GitHub Secrets에 SUPABASE_URL 또는 SUPABASE_ANON_KEY가 설정되지 않았습니다. 저장소 Settings -> Secrets and variables -> Actions에서 등록해 주세요."
            exit 1
          fi
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/cohorts?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          
          echo "Supabase API Response Status Code: $RESPONSE"
          
          if [ "$RESPONSE" -ge 200 ] && [ "$RESPONSE" -lt 300 ]; then
            echo "Ping 성공! Supabase 프로젝트가 정상적으로 활성화 상태를 유지합니다."
          else
            echo "::error::Ping 실패 (HTTP Status: $RESPONSE). Supabase 프로젝트가 정지(Paused) 상태이거나 API 키가 만료되었을 수 있습니다."
            exit 1
          fi

