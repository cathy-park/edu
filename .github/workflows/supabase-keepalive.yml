name: Supabase Keep Alive

on:
  schedule:
    # 매주 월요일, 목요일 오전 9시(UTC 00:00)에 실행
    - cron: '0 0 * * 1,4'
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API to prevent pausing
        run: |
          curl -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/cohorts?select=id&limit=1" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
